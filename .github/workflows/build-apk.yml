name: Build RethinkDNS Plus APK

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Remove local java.home from gradle.properties
        run: sed -i '/org.gradle.java.home/d' gradle.properties

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        if: github.event_name != 'pull_request' && secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: Build Debug APK (PR only)
        if: github.event_name == 'pull_request'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Signed Release APK
        if: github.event_name != 'pull_request' && secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_PATH: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --stacktrace

      - name: Build Fail-Safe Debug-Signed APK (Fallback if secrets missing)
        if: github.event_name != 'pull_request' && secrets.KEYSTORE_BASE64 == ''
        run: |
          echo "GitHub Repository Secrets are not configured. Falling back to building a fully functional debug-signed Full build..."
          ./gradlew assembleFdroidFullDebug --stacktrace

      # Rename APK dengan suffix "plus"
      - name: Rename APK with "plus" suffix
        if: github.event_name != 'pull_request'
        run: |
          cd app/build/outputs/apk/
          find . -name "*.apk" -type f | while read -r f; do
            mv "$f" "${f%.apk}-plus.apk"
          done

      - name: Rename Debug APK with "plus" suffix
        if: github.event_name == 'pull_request'
        run: |
          cd app/build/outputs/apk/
          find . -name "*.apk" -type f | while read -r f; do
            mv "$f" "${f%.apk}-plus.apk"
          done

      - name: Upload Debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debug-plus-${{ github.sha }}
          path: app/build/outputs/apk/**/*-plus.apk
          retention-days: 7

      - name: Upload Release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-plus-${{ github.sha }}
          path: app/build/outputs/apk/**/*-plus.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/**/*-plus.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
